# typos (https://github.com/crate-ci/typos) configuration
# Named `_typos.toml` so it doesn't shadow Cargo features matching on `typos.*`.

[default]
# Honorary words unique to this project / domain.
extend-ignore-identifiers-re = [
    "[A-Fa-f0-9]{7,}",   # git SHAs in comments / ADRs
    "U\\+[0-9A-Fa-f]+",  # Unicode codepoint references in gaiji docs
]

[default.extend-words]
# Project-specific terms — Japanese transliteration shouldn't trigger
# English typo heuristics, neither should aozora-domain shorthand.
afm     = "afm"          # aozora-flavored markdown — historical name
aozora  = "aozora"
gaiji   = "gaiji"        # 外字 — out-of-set glyphs
mencode = "mencode"      # 面区点 — JIS plane/row/cell reference
chuki   = "chuki"        # 注記 — typesetting annotation
ruby    = "ruby"         # ルビ — also the language but irrelevant here
bouten  = "bouten"       # 傍点 — emphasis dots
kome    = "kome"         # ※ — gaiji marker name

# EPUB ecosystem proper nouns + prior art (ADR-0001 mentions all four).
epubcheck      = "epubcheck"
AozoraEpub3    = "AozoraEpub3"
kyukyunyorituryo = "kyukyunyorituryo"
hmdev          = "hmdev"
whiteleaf7     = "whiteleaf7"
Vivliostyle    = "Vivliostyle"
Thorium        = "Thorium"
Calibre        = "Calibre"
Kobo           = "Kobo"

# Names appearing in NOTICE / handoffs / commit messages.
Yasunobu = "Yasunobu"

# `mut` is a Rust keyword and shows up everywhere in code; the
# dictionary occasionally flags it. Pin it.
mut = "mut"

[files]
extend-exclude = [
    "target/",
    "*.lock",
    "*.html",
    "LICENSE-*",
    "NOTICE",
]
